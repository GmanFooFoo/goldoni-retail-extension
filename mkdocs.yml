site_name: Goldoni Retail Extension
site_description: Business Case für Vakuumprodukte aus der Goldoni-Küche
site_author: Marcello
copyright: "© 2026 — Ristorante Goldoni"

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: deep orange
      accent: red
      toggle:
        icon: material/weather-night
        name: Dunkles Design
    - scheme: slate
      primary: deep orange
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Helles Design
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

exclude_docs: |
  how-to-use-marcello.md
